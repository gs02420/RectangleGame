<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Journey To Mental Stability!</h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p id="score">Stability level = 0</p>
    <p id="highScore">Highest stability level = 0</p>

    <script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const highElement = document.getElementById('highScore');
const enemyGap = 300;
let enemyAmount  =2;
let enemySpeed = 2;
let score = 0;
let highScore = 0;
let playerY = 150;
let isJump  = false;
let playerSize = 50;
const gravity = 0.25;
let velocityY = 0;
let Enemys= [
    new Obstacle(50, 50,canvas.width + 100),
    new Obstacle(50, 50,canvas.width + 100 + enemyGap)
];
function Obstacle(width, height, x){
  this.speed = 2;
  this.width = width;
  this.height = height;
  this.x = x;
  this.y = canvas.height - height;
}

function bottomLine(){
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 1);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.stroke();
}
function enemySpawn() {
if (score >= 5 && Enemys.length < 3) {
    let newX = canvas.width + Math.random() * 200 + 100;

    let toClose = false;
    Enemys.forEach(enemy => {
    if (Math.abs(enemy.x - newX) < enemyGap) {
    toClose = true;}
});
if(!toClose){
Enemys.push(
        new Obstacle(50,50,canvas.width + 300));
}
}else if (score < 5 && Enemys.length > 2) {
Enemys.pop();
};
}
function enemyRespawn(enemy) {
        if (enemy.x < -enemy.width) {
    let newX = canvas.width + Math.random() * 200 + 100;
    let maxRight = 0;
    Enemys.forEach(otherEnemy => {
        if(otherEnemy.x > maxRight){
            maxRight = otherEnemy.x;
}
            });
    enemy.x = maxRight + enemyGap + Math.random() * 100;
    score++;
                    }
}
function updateGame(){
            if (isJump) {
            velocityY += gravity;
            playerY += velocityY;

            if (playerY >= canvas.height - playerSize) {
                playerY = canvas.height - playerSize;
                isJump = false;
                velocityY = 0;
            }
        } else {
             playerY = canvas.height - playerSize;
        }
let enemySpeed = Math.floor(score/10) + 2;

    enemySpawn();
    Enemys.forEach( enemy => {
        enemy.speed = enemySpeed;
        enemy.x -= enemy.speed;
        
        enemyRespawn(enemy);
    if(
        50 < enemy.x + enemy.width &&
        50 + playerSize > enemy.x && playerY < enemy.y + enemy.height && playerY + playerSize > enemy.y
    ) {
        highScore = score;
        score = 0;
        Enemys[0].x = canvas.width + 100;
        Enemys[1].x = canvas.width + 100 + enemyGap; 
        if (Enemys[2]) Enemys[2].x = canvas.width + 100 + enemyGap * 2;    
        console.log ("Collision",score)
        highElement.textContent = `Highest stability level = ${highScore}`;
    }
});
    scoreElement.textContent = `stability level = ${score}`;


}

function drawGame(){
    ctx.clearRect(0, 0,canvas.width, canvas.height);

    bottomLine();

    ctx.fillStyle = 'blue';
    ctx.fillRect(50, playerY, playerSize, playerSize);

 
    ctx.fillStyle = 'red';
    Enemys.forEach( enemy => {

        ctx.fillRect(enemy.x,enemy.y, enemy.width, enemy.height);
    });
}
function gameLoop(){
    updateGame();

    drawGame();

    requestAnimationFrame(gameLoop);
}
document.addEventListener('keydown',(event) =>{
    if(event.code === "Space" && !isJump){
        isJump = true;

        velocityY = -10;
    }
});
gameLoop();
</script>
</body>
</html>
